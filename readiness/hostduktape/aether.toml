# Build config for the host-Js readiness target.
#
# Intentionally empty. The Js bridge dlopens libjs at runtime (no -ljs on
# the link line), and `ae build` links the in-tree bridge .a (libaether_host_js.a)
# automatically whenever the source imports contrib.host.js — the import is the
# trigger. So this target needs NO cflags and NO link_flags.
#
# aeb-ctr probes the HOST's js and passes AETHER_JS_SONAME (the bridge's
# runtime loading-order step 1) — an env var the bridge reads at runtime, not a
# build flag, so it does not belong here.
#
# See ../../../aether/contrib/host/js/README.md and the CHANGELOG dlopen-sweep
# entry.
