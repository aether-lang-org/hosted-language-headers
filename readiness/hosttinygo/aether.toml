# Build config for the host-TinyGo readiness target.
#
# `ae build` auto-links the in-tree bridge .a (libaether_host_tinygo.a) because
# hosttinygo.ae imports contrib.host.tinygo — the import is the trigger.
#
# link_flags = "-lffi": the tinygo bridge .a is the ONLY one of the host bridges
# with a link-time dependency of its own — it compiles tinygo_call_dynamic under
# AETHER_HAS_LIBFFI, so the .a has unresolved ffi_* symbols that need -lffi on
# the link line. aether's import-driven auto-link adds the .a but NOT its -lffi
# (the other five bridges have no such transitive lib), so we supply it here.
# (Reported to aether-side as a gap; once their auto-link adds -lffi for the
# tinygo bridge, this line can go.)
[build]
link_flags = "-lffi"

# Unlike the six interpreter bridges, tinygo needs NO AETHER_*_SONAME: the
# sidecar libgreet.so is loaded by explicit PATH (tinygo.load("...")), not by
# soname discovery. The sidecar is built with standard `go build
# -buildmode=c-shared` in the container (Phase 1, via aether.tinygo_lib in
# greet/); the .so rides the mount to the host where the Aether binary dlopens it
# (Phase 2). The host needs no Go toolchain.
#
# See ../../../aether/contrib/host/tinygo/README.md.
