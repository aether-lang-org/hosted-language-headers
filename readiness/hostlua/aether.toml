# Build config for the host-Lua readiness target.
#
# Intentionally empty. The Lua bridge dlopens liblua at runtime (no -llua on
# the link line), and `ae build` links the in-tree bridge .a (libaether_host_lua.a)
# automatically whenever the source imports contrib.host.lua — the import is the
# trigger. So this target needs NO cflags and NO link_flags.
#
# aeb-ctr probes the HOST's lua and passes AETHER_LUA_SONAME (the bridge's
# runtime loading-order step 1) — an env var the bridge reads at runtime, not a
# build flag, so it does not belong here.
#
# See ../../../aether/contrib/host/lua/README.md and the CHANGELOG dlopen-sweep
# entry.
