# Build config for the host-Python readiness target.
#
# Intentionally empty as of aether v0.209.0. The Python bridge now dlopens
# libpython at runtime (no -lpython on the link line), and `ae build` links the
# in-tree bridge .a automatically whenever the source `import`s
# contrib.host.python — the import is the trigger. So this target needs:
#   - NO link_flags  (the bridge dlopens libpython; nothing to link)
#   - NO cflags      (-DAETHER_HAS_PYTHON gates the bridge .a, which is built
#                     in the toolchain image via `make install-contrib`; the
#                     user program only `import`s and is linked against it)
#
# aeb-ctr still probes the HOST's interpreter and passes AETHER_PYTHON_SONAME
# (sysconfig INSTSONAME) into the container build, but that's an *env var the
# bridge reads at runtime* (loading-order step 1), not a build flag — so it
# does not belong here.
#
# See ../../../aether/contrib/host/python/README.md ("aether.toml — usually
# empty for python") and CHANGELOG [0.209.0].
